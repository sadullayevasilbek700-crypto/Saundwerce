<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundVerse - To'liq Musiqa Pleyeri</title>
    <script src="https://www.youtube.com/iframe_api"></script>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        h1 { text-align: center; color: var(--accent-color); margin-top: 0; }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #334155;
            color: white;
            font-size: 16px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            background: var(--accent-color);
            color: white;
            font-weight: bold;
            cursor: pointer;
        }
        .track-card {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px;
            background: #334155;
            border-radius: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.2s;
        }
        .track-card:hover { background: #475569; }
        .track-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; }
        .track-info { flex: 1; }
        .track-title { font-weight: bold; font-size: 15px; }
        .track-artist { color: #cbd5e1; font-size: 13px; }
        #player-controls {
            margin-top: 20px;
            padding: 15px;
            background: #0f172a;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        #yt-player { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>SoundVerse</h1>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Musiqa yoki ijrochi nomi...">
        <button onclick="searchMusic()">Qidirish</button>
    </div>

    <div id="results-list"></div>

    <div id="player-controls">
        <div id="current-title" style="font-weight: bold; margin-bottom: 5px;"></div>
        <div id="current-artist" style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;"></div>
        <button onclick="togglePlay()" id="play-btn">Pauza</button>
    </div>
</div>

<!-- Yashirin YouTube Pleyer -->
<div id="yt-player"></div>

<script>
    let player;
    let isPlaying = false;

    // YouTube API yuklanganda ishga tushadi
    function onYouTubeIframeAPIReady() {
        player = new YT.Player('yt-player', {
            height: '0',
            width: '0',
            videoId: '',
            events: {
                'onStateChange': onPlayerStateChange
            }
        });
    }

    // Spotify'dan qidirib, natijani YouTube orqali ijro etish
    async function searchMusic() {
        const query = document.getElementById('search-input').value;
        if (!query) return;

        const resultsList = document.getElementById('results-list');
        resultsList.innerHTML = '<p style="text-align:center;">Qidirilmoqda...</p>';

        try {
            // Vercel backend'ingizga so'rov yuborish
            const response = await fetch(`/api/spotify-token`);
            const tokenData = await response.json();
            
            const spotifyRes = await fetch(`https://api.spotify.com/v1/search?q=${encodeURIComponent(query)}&type=track&limit=5`, {
                headers: { 'Authorization': `Bearer ${tokenData.access_token}` }
            });
            const data = await spotifyRes.json();

            resultsList.innerHTML = '';
            data.tracks.items.forEach(track => {
                const card = document.createElement('div');
                card.className = 'track-card';
                card.onclick = () => playFullTrack(track.name, track.artists[0].name);

                card.innerHTML = `
                    <img class="track-img" src="${track.album.images[0]?.url || 'https://via.placeholder.com/50'}">
                    <div class="track-info">
                        <div class="track-title">${track.name}</div>
                        <div class="track-artist">${track.artists[0].name}</div>
                    </div>
                `;
                resultsList.appendChild(card);
            });
        } catch (err) {
            resultsList.innerHTML = '<p style="color:red; text-align:center;">Xatolik yuz berdi. Kalitlarni tekshiring.</p>';
        }
    }

    // Musiqa nomini olib, YouTube'dan to'liq variantini topib qo'yish
    function playFullTrack(title, artist) {
        document.getElementById('player-controls').style.display = 'block';
        document.getElementById('current-title').innerText = title;
        document.getElementById('current-artist').innerText = artist;

        // YouTube'dan qidirish uchun bepul ochiq havola
        const searchUrl = `https://suggestqueries.google.com/complete/search?client=youtube&ds=yt&q=${encodeURIComponent(artist + ' ' + title)}`;
        
        // Bu kod to'g'ridan-to'g'ri YouTube'dan videoni qidirib topib, uning ID'sini pleyerga yuklaydi
        fetch(`https://images${Math.floor(Math.random() * 3)}-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent('https://www.youtube.com/results?search_query=' + artist + ' ' + title + ' official audio')}`)
        .then(res => res.text())
        .then(html => {
            const idMatch = html.match(/"videoId":"([^"]+)"/);
            if (idMatch && idMatch[1]) {
                player.loadVideoById(idMatch[1]);
                isPlaying = true;
                document.getElementById('play-btn').innerText = 'Pauza';
            } else {
                alert("Musiqa topilmadi!");
            }
        });
    }

    function togglePlay() {
        if (isPlaying) {
            player.pauseVideo();
            document.getElementById('play-btn').innerText = 'Chalish';
        } else {
            player.playVideo();
            document.getElementById('play-btn').innerText = 'Pauza';
        }
        isPlaying = !isPlaying;
    }

    function onPlayerStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) {
            document.getElementById('play-btn').innerText = 'Chalish';
            isPlaying = false;
        }
    }
</script>

</body>
</html>
